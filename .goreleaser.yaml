version: 2
project_name: granary

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    binary: granary
    ldflags:
      - -s -w -X main.version={{.Version}}
    hooks:
      post:
        - cmd: 'codesign --force --options runtime --sign "Developer ID Application: Wassim Metallaoui ({{ .Env.APPLE_TEAM_ID }})" "{{ .Path }}"'

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}-Darwin-{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc

brews:
  - repository:
      owner: wassimk
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: granary
    description: "Export Granola meeting notes and transcripts to markdown"
    homepage: "https://github.com/wassimk/granary"
    license: "MIT"
    install: |
      bin.install "granary"
    caveats: |
      To start granary as a background service (exports every 6 hours):
        granary install

      To remove the background service:
        granary uninstall
    test: |
      assert_match version.to_s, shell_output("#{bin}/granary version")
